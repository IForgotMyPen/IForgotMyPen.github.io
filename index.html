<!DOCTYPE html>
<head>
    <title>IForgotMyPen</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="header">
        <div class="break"></div>

        <div id="name">
            <h1>Brendan</h1>
        </div>

        <div id="screen-name">
            <p>(aka IForgotMyPen)</p>
        </div>

        <div class="bio">
            <p>
                Computer and Data Science Student
                <br>
                Student IT Support Specialist
            </p>
        </div>

        <div id="question">
            <p>So what do you want to know?</p>
        </div>
    </div>

    <div id="tab-bar">
        <div class="tab" id="projects">
            <button onclick="changeTab('projects')">Projects</button>
        </div>

        <div class="tab" id="experience">
            <button onclick="changeTab('experience')">Experience</button>
        </div>

        <div class="tab" id="education">
            <button onclick="changeTab('education')">Education</button>
        </div>

        <div class="tab" id="contact">
            <button onclick="changeTab('contact')">Contact</button>
        </div>
    </div>

    <div id="break" style="height: 16px;"></div>

    <div id="tab-content-area">
        <div class="tab-content" id="projects">
            <p>TEMP: this is the projects tab</p>
        </div>

        <div class="tab-content" id="experience">
            <p>TEMP: this is the experience tab</p>
        </div>

        <div class="tab-content" id="education">
            <p>TEMP: this is the education tab</p>
        </div>

        <div class="tab-content" id="contact">
            <p>TEMP: this is the contact tab</p>
        </div>
    </div>
</body>

<script src="index.js"></script>
</html>
